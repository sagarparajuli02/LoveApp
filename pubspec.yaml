name: love_days
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  flutter_riverpod: ^3.2.1
  home_widget: ^0.9.0
  google_sign_in: ^6.2.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.2.3
  intl: ^0.18.1
  image_picker: ^0.8.7+5
  firebase_storage: ^13.0.6
  flutter_staggered_grid_view: ^0.7.0
  shared_preferences: ^2.5.4
  photo_view: ^0.15.0
  uuid: ^4.3.1
  share_plus: ^12.0.1
  http: ^1.2.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/google_logo.svg
    - assets/google_logo.png
    - assets/icons/
    - assets/icons/birthday.png
    - assets/icons/gift.png
    - assets/icons/plane.png
    - assets/icons/ring.png
